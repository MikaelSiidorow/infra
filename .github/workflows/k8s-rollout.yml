name: K8s Rollout Restart

on:
  workflow_call:
    inputs:
      namespace:
        required: true
        type: string
      deployments:
        required: true
        type: string # comma-separated
    secrets:
      HEADSCALE_AUTH_KEY:
        required: true
      K8S_DEPLOY_KUBECONFIG:
        required: true

jobs:
  rollout:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Headscale VPN
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.HEADSCALE_AUTH_KEY }}
          args: "--login-server=https://hs.miksu.app"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.K8S_DEPLOY_KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Rollout restart
        run: |
          IFS=',' read -ra DEPS <<< "${{ inputs.deployments }}"
          for dep in "${DEPS[@]}"; do
            dep=$(echo "$dep" | xargs)
            echo "Restarting deployment/$dep in ${{ inputs.namespace }}..."
            kubectl rollout restart "deployment/$dep" -n "${{ inputs.namespace }}"
          done
          for dep in "${DEPS[@]}"; do
            dep=$(echo "$dep" | xargs)
            echo "Waiting for deployment/$dep..."
            kubectl rollout status "deployment/$dep" -n "${{ inputs.namespace }}" --timeout=300s
          done
