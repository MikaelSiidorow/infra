apiVersion: v1
kind: Service
metadata:
  name: headscale
  namespace: headscale
spec:
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Endpoints
metadata:
  name: headscale
  namespace: headscale
subsets:
  - addresses:
      - ip: 10.42.0.1 # Host via K3s CNI bridge
    ports:
      - port: 8080
