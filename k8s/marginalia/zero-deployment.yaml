apiVersion: apps/v1
kind: Deployment
metadata:
  name: marginalia-zero
  namespace: marginalia
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: marginalia-zero
  template:
    metadata:
      labels:
        app: marginalia-zero
        app.kubernetes.io/name: marginalia-zero
        app.kubernetes.io/component: zero
        app.kubernetes.io/part-of: marginalia
    spec:
      containers:
        - name: zero
          image: rocicorp/zero:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4848
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /keepalive
              port: 4848
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /keepalive
              port: 4848
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /keepalive
              port: 4848
            periodSeconds: 30
          env:
            - name: NODE_ENV
              value: production
            - name: ZERO_LOG_FORMAT
              value: json
            - name: ZERO_APP_ID
              value: marginalia
            - name: ZERO_UPSTREAM_DB
              valueFrom:
                secretKeyRef:
                  name: marginalia-secrets
                  key: DATABASE_URL
            - name: ZERO_CVR_DB
              valueFrom:
                secretKeyRef:
                  name: marginalia-secrets
                  key: DATABASE_CVR_URL
            - name: ZERO_CHANGE_DB
              valueFrom:
                secretKeyRef:
                  name: marginalia-secrets
                  key: DATABASE_CDB_URL
            - name: ZERO_REPLICA_FILE
              value: /data/sync-replica.db
            - name: ZERO_PUSH_URL
              value: http://marginalia-app/api/zero/mutate
            - name: ZERO_QUERY_URL
              value: http://marginalia-app/api/zero/get-queries
            - name: ZERO_QUERY_FORWARD_COOKIES
              value: "true"
            - name: ZERO_MUTATE_FORWARD_COOKIES
              value: "true"
            - name: ZERO_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: marginalia-secrets
                  key: BETTER_AUTH_SECRET
            - name: ZERO_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: marginalia-secrets
                  key: ZERO_ADMIN_PASSWORD
          volumeMounts:
            - name: replica-data
              mountPath: /data
      volumes:
        - name: replica-data
          persistentVolumeClaim:
            claimName: marginalia-zero-replica-data
