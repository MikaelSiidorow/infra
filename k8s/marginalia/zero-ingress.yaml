apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: marginalia-zero
  namespace: marginalia
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - zero.marginalia.miksu.app
      secretName: marginalia-zero-tls
  rules:
    - host: zero.marginalia.miksu.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: marginalia-zero
                port:
                  number: 4848
