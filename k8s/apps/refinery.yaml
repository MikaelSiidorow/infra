apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: refinery
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/MikaelSiidorow/infra.git
    targetRevision: main
    path: k8s/refinery
  destination:
    server: https://kubernetes.default.svc
    namespace: refinery
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
