apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: alloy
    targetRevision: 1.6.0
    helm:
      values: |
        alloy:
          configMap:
            content: |
              // Discover Kubernetes pods
              discovery.kubernetes "pods" {
                role = "pod"
              }

              // Relabel discovered pods
              discovery.relabel "pods" {
                targets = discovery.kubernetes.pods.targets

                rule {
                  source_labels = ["__meta_kubernetes_namespace"]
                  target_label  = "namespace"
                }

                rule {
                  source_labels = ["__meta_kubernetes_pod_name"]
                  target_label  = "pod"
                }

                rule {
                  source_labels = ["__meta_kubernetes_pod_container_name"]
                  target_label  = "container"
                }

                rule {
                  source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
                  target_label  = "app"
                }

                rule {
                  source_labels = ["__meta_kubernetes_pod_node_name"]
                  target_label  = "node"
                }
              }

              // Collect logs from pods
              loki.source.kubernetes "pods" {
                targets    = discovery.relabel.pods.output
                forward_to = [loki.process.json_logs.receiver]
              }

              // Parse JSON logs and extract level
              loki.process "json_logs" {
                stage.json {
                  expressions = {
                    level_raw = "level",
                    severity  = "severity",
                  }
                }

                // Map pino numeric levels to strings
                stage.template {
                  source   = "level_label"
                  template = "{{`{{ if .severity }}{{ .severity }}{{ else if eq .level_raw \"10\" }}trace{{ else if eq .level_raw \"20\" }}debug{{ else if eq .level_raw \"30\" }}info{{ else if eq .level_raw \"40\" }}warn{{ else if eq .level_raw \"50\" }}error{{ else if eq .level_raw \"60\" }}fatal{{ else if .level_raw }}{{ .level_raw }}{{ else }}unknown{{ end }}`}}"
                }

                stage.labels {
                  values = {
                    level = "level_label",
                  }
                }

                forward_to = [loki.write.default.receiver]
              }

              // Write logs to Loki
              loki.write "default" {
                endpoint {
                  url = "http://loki.loki.svc.cluster.local:3100/loki/api/v1/push"
                }
              }

              // Receive OTLP data from applications
              otelcol.receiver.otlp "default" {
                http {
                  endpoint = "0.0.0.0:4318"
                }
                output {
                  traces = [otelcol.exporter.otlp.tempo.input]
                  logs   = [otelcol.exporter.loki.default.input]
                }
              }

              // Forward traces to Tempo
              otelcol.exporter.otlp "tempo" {
                client {
                  endpoint = "tempo.tempo.svc.cluster.local:4317"
                  tls {
                    insecure = true
                  }
                }
              }

              // Convert OTLP logs to Loki format
              otelcol.exporter.loki "default" {
                forward_to = [loki.write.default.receiver]
              }
          extraPorts:
            - name: otlp-http
              port: 4318
              targetPort: 4318
              protocol: TCP
          resources:
            requests:
              memory: 64Mi
            limits:
              memory: 128Mi

        controller:
          type: daemonset
  destination:
    server: https://kubernetes.default.svc
    namespace: alloy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
